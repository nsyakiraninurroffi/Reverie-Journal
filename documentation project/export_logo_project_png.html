<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Reverie Logo</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        button {
            background: linear-gradient(to right, #818cf8, #c084fc);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Reverie Logo PNG Exporter</h2>
        <p>Klik tombol di bawah untuk men-download versi PNG dari favicon.svg kamu.</p>
        <canvas id="canvas" width="512" height="512" style="background: transparent; max-width: 200px; display: block; margin: 0 auto;"></canvas>
        <button id="downloadBtn">Download logo.png</button>
    </div>

    <script>
        const svgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
  <defs>
    <linearGradient id="reverie-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <path d="M12.67 19a2 2 0 0 0 1.416-.588l6.154-6.172a6 6 0 0 0-8.49-8.49L5.586 9.914A2 2 0 0 0 5 11.328V18a1 1 0 0 0 1 1z" fill="none" stroke="url(#reverie-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <line x1="16" y1="8" x2="2" y2="22" fill="none" stroke="url(#reverie-grad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="12" y1="12" x2="8" y2="16" fill="none" stroke="url(#reverie-grad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
</svg>`;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        // Convert SVG to data URL
        const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);

        img.onload = function() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            URL.revokeObjectURL(url);
        };
        img.src = url;

        document.getElementById('downloadBtn').addEventListener('click', function() {
            const pngUrl = canvas.toDataURL('image/png', 1.0);
            const a = document.createElement('a');
            a.href = pngUrl;
            a.download = 'logo_reverie.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
